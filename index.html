<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>URS FNS 2026</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#ffffff;
    font-family:Arial,sans-serif;
}

.loader{
    width:70px;
    height:70px;
    border:6px solid #ddd;
    border-top:6px solid #003366;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

h1{
    margin-top:25px;
}

p{
    color:#666;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="loader"></div>

<h1>URS FNS 2026</h1>

<p>Loading Symposium Website...</p>

    window.location.href =
    "https://sites.google.com/view/ursousl/home";
}, 3000);
</script>
